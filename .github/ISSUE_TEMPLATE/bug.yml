name: "Bug Report"
description: "Something is broken"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the bug"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What should happen instead?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "How can we reproduce this?"
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
  - type: input
    id: version
    attributes:
      label: Battery Guard version
      placeholder: "e.g. 1.1.0"
