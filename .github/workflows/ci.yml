name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================================================
  # HACS Validation
  # ==========================================================================
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  # ==========================================================================
  # Python Integration
  # ==========================================================================
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check custom_components/battery_guard/
      - run: ruff format --check custom_components/battery_guard/

  # ==========================================================================
  # Wizard Frontend
  # ==========================================================================
  lint-wizard:
    name: Lint & Typecheck Wizard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wizard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wizard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build-wizard:
    name: Build Wizard
    runs-on: ubuntu-latest
    needs: lint-wizard
    defaults:
      run:
        working-directory: wizard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wizard/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Copy built wizard to integration frontend
        run: |
          mkdir -p ../custom_components/battery_guard/frontend
          cp -r dist/* ../custom_components/battery_guard/frontend/
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizard-dist
          path: wizard/dist/
