name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-yaml:
    name: Lint YAML Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML packages
        run: >
          yamllint -d "{extends: default, rules:
          {line-length: {max: 200}, truthy: disable,
          comments-indentation: disable, document-start: disable}}"
          packages/battery_guard/*.yaml

  lint-wizard:
    name: Lint & Typecheck Wizard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wizard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wizard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test-wizard:
    name: Test Wizard
    runs-on: ubuntu-latest
    needs: lint-wizard
    defaults:
      run:
        working-directory: wizard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wizard/package-lock.json
      - run: npm ci
      - run: npm run test -- --coverage --reporter=verbose
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: wizard/coverage/

  build-wizard:
    name: Build Wizard
    runs-on: ubuntu-latest
    needs: [lint-wizard, test-wizard]
    defaults:
      run:
        working-directory: wizard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wizard/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizard-dist
          path: wizard/dist/
