# =============================================================================
# PV-Notstrom: Template-Sensoren
# =============================================================================
# - Stromausfall-Erkennung (binary_sensor)
# - Erkennung nicht zugewiesener Geräte (sensor)

template:
  - binary_sensor:
      - name: "Stromausfall"
        unique_id: pv_notstrom_stromausfall
        device_class: problem
        icon: mdi:transmission-tower-off
        # TODO: Entity-ID anpassen sobald Modbus/huawei_solar aktiv ist
        # Variante A: huawei_solar Grid-Status
        state: >
          {{ states('sensor.grid_connection_status') in ['Off-Grid', 'Disconnected'] }}
        # Variante B (Fallback): Netzspannung über Shelly 3EM Stromzähler
        # Wenn alle 3 Phasen unter 50V fallen = Stromausfall
        # state: >
        #   {{ states('sensor.stromzahler_nb_suites_gesamt_channel_a_voltage') | float(230) < 50
        #      and states('sensor.stromzahler_nb_suites_gesamt_channel_b_voltage') | float(230) < 50
        #      and states('sensor.stromzahler_nb_suites_gesamt_channel_c_voltage') | float(230) < 50 }}

  - sensor:
      - name: "Notstrom: Nicht zugewiesene Geräte"
        unique_id: pv_notstrom_unzugewiesen
        icon: mdi:help-circle
        unit_of_measurement: "Geräte"
        state: >
          {% set alle = states.switch | map(attribute='entity_id') | list
             + states.climate | map(attribute='entity_id') | list
             + states.light | map(attribute='entity_id') | list
             + states.media_player | map(attribute='entity_id') | list %}
          {% set zugewiesen = label_entities('notstrom_stufe1')
             + label_entities('notstrom_stufe2')
             + label_entities('notstrom_stufe3') %}
          {% set ignoriert = label_entities('notstrom_ignorieren') %}
          {{ (alle | reject('in', zugewiesen) | reject('in', ignoriert) | list) | count }}
        attributes:
          entities: >
            {% set alle = states.switch | map(attribute='entity_id') | list
               + states.climate | map(attribute='entity_id') | list
               + states.light | map(attribute='entity_id') | list
               + states.media_player | map(attribute='entity_id') | list %}
            {% set zugewiesen = label_entities('notstrom_stufe1')
               + label_entities('notstrom_stufe2')
               + label_entities('notstrom_stufe3') %}
            {% set ignoriert = label_entities('notstrom_ignorieren') %}
            {{ alle | reject('in', zugewiesen) | reject('in', ignoriert) | list }}
