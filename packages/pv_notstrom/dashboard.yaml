# =============================================================================
# PV-Notstrom: Lovelace Dashboard
# =============================================================================
# Dieses Dashboard wird als eigene View in die Lovelace-Konfiguration eingebunden.
#
# Voraussetzung: HACS-Karte "auto-entities" für dynamische Entity-Listen
#   https://github.com/thomasloven/lovelace-auto-entities
#
# Einbinden in HA:
#   1. Lovelace → Dashboard bearbeiten → View hinzufügen
#   2. Oder in ui-lovelace.yaml als eigene View einfügen

type: panel
title: Notstrom
icon: mdi:flash-alert
path: notstrom
cards:
  - type: vertical-stack
    cards:
      # =======================================================================
      # Zeile 1: Status-Übersicht
      # =======================================================================
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.battery_state_of_capacity
            name: Batterie
            unit: "%"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 10
            needle: true

          - type: entities
            title: Status
            entities:
              - entity: binary_sensor.stromausfall
                name: Stromausfall
              - entity: input_boolean.pv_notstrom_aktiv
                name: Notstrom-Modus
              - entity: input_boolean.pv_notstrom_stufe2_abgeschaltet
                name: Stufe 2 abgeschaltet
              # TODO: Entity-ID für Grid-Status anpassen
              # - entity: sensor.grid_connection_status
              #   name: Netzstatus

      # =======================================================================
      # Zeile 2: Konfiguration
      # =======================================================================
      - type: entities
        title: Konfiguration
        show_header_toggle: false
        entities:
          - entity: input_number.pv_notstrom_schwellwert_stufe2
            name: "Schwellwert Stufe 2 (Abschaltung)"
          - entity: input_number.pv_notstrom_recovery_schwellwert
            name: "Recovery-Schwellwert Stufe 2"
          - entity: input_boolean.pv_notstrom_auto_recovery
            name: "Auto-Recovery aktiviert"
          - type: divider
          - entity: sensor.notstrom_nicht_zugewiesene_gerate
            name: "Geräte ohne Zuordnung"

      # =======================================================================
      # Zeile 3: Geräte pro Stufe
      # =======================================================================

      # --- Stufe 1: Sofort aus ---
      # Variante A: Mit auto-entities (HACS)
      - type: custom:auto-entities
        card:
          type: entities
          title: "🔴 Stufe 1 — Sofort aus bei Stromausfall"
          show_header_toggle: false
        filter:
          include:
            - label: notstrom_stufe1
        sort:
          method: domain

      # --- Stufe 2: Bei niedrigem SOC ---
      - type: custom:auto-entities
        card:
          type: entities
          title: "🟡 Stufe 2 — Aus bei niedrigem Batteriestand"
          show_header_toggle: false
        filter:
          include:
            - label: notstrom_stufe2
        sort:
          method: domain

      # --- Stufe 3: Nie aus ---
      - type: custom:auto-entities
        card:
          type: entities
          title: "🟢 Stufe 3 — Nie abschalten"
          show_header_toggle: false
        filter:
          include:
            - label: notstrom_stufe3
        sort:
          method: domain

      # =======================================================================
      # Zeile 4: Nicht zugewiesene Geräte
      # =======================================================================
      - type: markdown
        title: "⚠️ Geräte ohne Notstrom-Zuordnung"
        content: >
          {% set entities = state_attr('sensor.notstrom_nicht_zugewiesene_gerate', 'entities') %}
          {% if entities and entities | count > 0 %}
          **{{ entities | count }} Geräte ohne Label:**

          {% for entity in entities %}
          - `{{ entity }}` — {{ states[entity].attributes.friendly_name | default(entity) }}
          {% endfor %}

          *Labels zuweisen: Einstellungen → Geräte & Dienste → Entity auswählen → Label hinzufügen*
          {% else %}
          Alle Geräte sind einer Notstrom-Stufe zugewiesen. ✅
          {% endif %}

      # =======================================================================
      # Manuelle Steuerung (für Tests)
      # =======================================================================
      - type: entities
        title: "🛠️ Manuelle Steuerung"
        show_header_toggle: false
        entities:
          - type: button
            name: "Stufe 1 abschalten (Test)"
            action_name: Ausführen
            tap_action:
              action: call-service
              service: script.pv_notstrom_stufe_aus
              service_data:
                stufe: notstrom_stufe1
          - type: button
            name: "Stufe 2 abschalten (Test)"
            action_name: Ausführen
            tap_action:
              action: call-service
              service: script.pv_notstrom_stufe_aus
              service_data:
                stufe: notstrom_stufe2
          - type: button
            name: "Alles wiederherstellen"
            action_name: Ausführen
            tap_action:
              action: call-service
              service: script.pv_notstrom_alles_ein
